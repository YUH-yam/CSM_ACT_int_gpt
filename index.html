<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
  <meta name="theme-color" content="#f6f7f4">
  <meta name="description" content="ACTとタスク管理を統合した個人向けセルフケアPWA。診断や治療を行うものではありません。">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ACT Compass">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <title>ACT Compass｜タスクとこころのセルフケア</title>
</head>
<body>
  <main id="app" class="app" role="main" aria-live="polite"></main>

  <nav class="bottom-nav" id="bottomNav" aria-label="メインナビゲーション">
    <button class="nav-btn" type="button" data-view="home" aria-current="page" aria-label="今日">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
      <span>今日</span>
    </button>
    <button class="nav-btn" type="button" data-view="tasks" aria-label="タスク">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6h12M9 12h12M9 18h12M4 6h1M4 12h1M4 18h1"/></svg>
      <span>タスク</span>
    </button>
    <button class="nav-btn" type="button" data-view="care" aria-label="ケア">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-7-4.4-9.2-8A5.4 5.4 0 0 1 12 6a5.4 5.4 0 0 1 9.2 7c-2.2 3.6-9.2 8-9.2 8Z"/></svg>
      <span>ケア</span>
    </button>
    <button class="nav-btn" type="button" data-view="scales" aria-label="尺度">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-7M20 16v-3"/></svg>
      <span>尺度</span>
    </button>
    <button class="nav-btn" type="button" data-view="settings" aria-label="設定">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .4 2l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.8 1.8 0 0 0-2-.4 1.8 1.8 0 0 0-1.1 1.7V21a2 2 0 0 1-4 0v-.1A1.8 1.8 0 0 0 8.8 19a1.8 1.8 0 0 0-2 .4l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1a1.8 1.8 0 0 0 .4-2A1.8 1.8 0 0 0 2.7 13H2.5a2 2 0 0 1 0-4h.2a1.8 1.8 0 0 0 1.7-1.1 1.8 1.8 0 0 0-.4-2l-.1-.1A2 2 0 0 1 6.7 3l.1.1a1.8 1.8 0 0 0 2 .4A1.8 1.8 0 0 0 9.9 1.8V1.5a2 2 0 0 1 4 0v.3A1.8 1.8 0 0 0 15 3.5a1.8 1.8 0 0 0 2-.4l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.8 1.8 0 0 0-.4 2 1.8 1.8 0 0 0 1.7 1.1h.4a2 2 0 0 1 0 4h-.4A1.8 1.8 0 0 0 19.4 15Z"/></svg>
      <span>設定</span>
    </button>
  </nav>

  <div id="toastHost" class="toast-host" aria-live="polite"></div>

  <script src="js/scales.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
